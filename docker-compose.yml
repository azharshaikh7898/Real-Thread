services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/app_state.json
    volumes:
      - backend_data:/app/data
    ports:
      - "${BACKEND_HOST_PORT:-8001}:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8001"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-4173}:4173"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles:
      - proxy
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_HOST_PORT:-18080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  backend_data:
